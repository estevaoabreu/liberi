<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liberi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css.css">
    <script src="libraries/p5.min.js"></script>
</head>

<body>
    <h1>Liberi</h1>
    <div style="margin-bottom: 20px;">
        <button id="connectBtn" style="padding: 10px 20px; font-family: 'Outfit', sans-serif; font-size: 16px; border: none; border-radius: 8px; background-color: #007bff; color: white; cursor: pointer; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: background-color 0.3s;">Connect to ESP32</button>
    </div>
    <main>
        <div>
            <h2 id="temperature">Measuring...</h2>
            <p>Your baby's temperature</p>
        </div>
        <div>
            <h2 id="heartrate">Measuring...</h2>
            <p>Your baby's heart rate</p>
        </div>
        <div>
            <h2 id="oxygen">Measuring...</h2>
            <p>Your baby's oxygen level</p>
        </div>
    </main>
    <script src="javascript.js"></script>
</body>

</html>
