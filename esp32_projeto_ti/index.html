<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liberi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css.css">
</head>

<body>

    <!-- Gradient wash layer — colour set via JS -->
    <div id="gradientWash" class="gradient-wash"></div>

    <h1>Liberi</h1>

    <!-- State text -->
    <div class="state-info">
        <h3 id="stateLabel">IDLE</h3>
        <p id="stateDesc">Waiting for activation…</p>
    </div>

    <main>
        <!-- Vitals row -->
        <div class="vital" id="card-temp">
            <h2 id="temperature">--</h2>
            <p>Your baby's temperature</p>
        </div>
        <div class="vital" id="card-hr">
            <h2 id="heartrate">--</h2>
            <p>Your baby's heart rate</p>
        </div>
        <div class="vital" id="card-spo2">
            <h2 id="oxygen">--</h2>
            <p>Your baby's oxygen level</p>
        </div>
        <div class="vital" id="card-pi">
            <h2 id="pi">--</h2>
            <p>Your baby's perfusion index</p>
        </div>
        <div class="vital" id="card-hrv">
            <h2 id="hrv">--</h2>
            <p>Your baby's HRV</p>
        </div>
    </main>

    <!-- State log -->
    <section class="log-section">
        <p class="log-heading">State Log</p>
        <ul id="stateLog" class="state-log"></ul>
    </section>

    <script src="javascript.js"></script>
</body>

</html>
