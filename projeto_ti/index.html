<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arduino Health Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Local Hardware Monitor</p>
          <h1>Arduino Health Dashboard</h1>
        </div>
        <div class="connection-controls">
          <label class="endpoint-field" for="ws-url">
            Wokwi WS URL
            <input id="ws-url" type="text" value="ws://localhost:9011" />
          </label>
          <button id="connect-btn" class="connect-btn" type="button">Connect to Wokwi</button>
          <span id="connection-status" class="status-pill disconnected">Disconnected</span>
        </div>
      </header>

      <section class="metrics-grid" aria-live="polite">
        <article class="metric-card bpm-card">
          <p class="metric-label">Heart Rate (BPM)</p>
          <p id="bpm-value" class="metric-value">--</p>
        </article>

        <article class="metric-card temp-card">
          <p class="metric-label">Temperature (°C)</p>
          <p id="temp-value" class="metric-value">--</p>
        </article>
      </section>

      <p class="hint-text">
        Start your Wokwi/PlatformIO simulation and expose serial output over WebSocket.
      </p>
      <p class="hint-text">
        Expected payload per line:
        <code>{"bpm": 75, "temp": 36.5}</code>
      </p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
